definitions:
  delivery.ErrorInfo:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  delivery.Meta:
    properties:
      last_page:
        type: integer
      next:
        type: integer
      page:
        type: integer
      per_page:
        type: integer
      prev:
        type: integer
      total:
        type: integer
    type: object
  delivery.Response:
    properties:
      data: {}
      errors:
        $ref: '#/definitions/delivery.ErrorInfo'
      meta:
        $ref: '#/definitions/delivery.Meta'
      success:
        type: boolean
    type: object
  handlers.UserProfileRequest:
    properties:
      academic_year:
        example: 3
        maximum: 5
        minimum: 1
        type: integer
      fullname:
        example: Mostafa Ahmed
        type: string
    required:
    - academic_year
    - fullname
    type: object
  handlers.forgetPasswordRequest:
    properties:
      email:
        description: User's email address (Required)
        example: user@example.com
        type: string
    required:
    - email
    type: object
  handlers.loginRequest:
    properties:
      password:
        description: User's password (Required)
        example: P@ssw0rd123
        type: string
      username:
        description: User's username (Required)
        example: mostafa_sensei
        type: string
    required:
    - password
    - username
    type: object
  handlers.registerRequest:
    properties:
      academic_year:
        description: Academic year from 1 to 5 (Required)
        example: 3
        maximum: 5
        minimum: 1
        type: integer
      college:
        description: User's college (Required)
        example: Computers & Info
        type: string
      department:
        description: User's department (Required)
        example: Computer Science
        type: string
      fullname:
        description: Full Name (Required)
        example: Mostafa Ahmed
        type: string
      gdg_track:
        description: GDG Track name (Optional, can be null)
        example: Flutter
        type: string
        x-nullable: true
      password:
        description: Password for login (Required)
        example: P@ssw0rd123
        type: string
      username:
        description: Username for login (Required)
        example: mostafa_sensei
        type: string
    required:
    - academic_year
    - college
    - department
    - fullname
    - password
    - username
    type: object
  handlers.runRequest:
    properties:
      accuracy:
        example: 85.5
        type: number
      bosses_defeated:
        example: 1
        type: integer
      bugs_squashed:
        example: 45
        type: integer
      cause_of_death:
        example: NullPointerException Boss
        type: string
      coffee_cups:
        example: 3
        type: integer
      duration:
        example: 120
        type: integer
      max_flow_state:
        example: 15
        type: integer
      score:
        example: 1500
        type: integer
      stage_reached:
        example: Staging Environment
        type: string
    required:
    - cause_of_death
    - duration
    - score
    type: object
  handlers.runResponse:
    properties:
      accuracy:
        example: 85.5
        type: number
      bosses_defeated:
        example: 1
        type: integer
      bugs_squashed:
        example: 45
        type: integer
      cause_of_death:
        example: NullPointerException Boss
        type: string
      coffee_cups:
        example: 3
        type: integer
      created_at:
        example: "2024-01-01T12:00:00Z"
        type: string
      duration:
        example: 120
        type: integer
      id:
        example: uuid-1234
        type: string
      max_flow_state:
        example: 15
        type: integer
      score:
        example: 1500
        type: integer
      stage_reached:
        example: Staging Environment
        type: string
    type: object
  handlers.spacecraftRequest:
    properties:
      name:
        example: Vim Fighter
        type: string
      rarity:
        example: Epic
        type: string
    required:
    - name
    type: object
  handlers.spacecraftResponse:
    properties:
      id:
        example: uuid-5678
        type: string
      is_active:
        example: true
        type: boolean
      level:
        example: 5
        type: integer
      name:
        example: Vim Fighter
        type: string
      rarity:
        example: Epic
        type: string
      unlocked_at:
        example: "2024-01-01T12:00:00Z"
        type: string
    type: object
info:
  contact: {}
  description: Astro Wars Backend API
  title: Astro Wars API
  version: "1.0"
paths:
  /api/v1/auth/account/:
    delete:
      description: Removes a user account by their ID.
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Delete Account
      tags:
      - auth
  /api/v1/auth/forget-password:
    post:
      consumes:
      - application/json
      description: Initiates password recovery (Currently placeholder).
      parameters:
      - description: User Email. 'email' field is required.
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.forgetPasswordRequest'
      produces:
      - application/json
      responses: {}
      summary: Forget Password
      tags:
      - auth
  /api/v1/auth/guest:
    post:
      description: Creates a temporary guest account. Does not require a request body.
        Returns a JWT token and the guest user's data.
      produces:
      - application/json
      responses: {}
      summary: Guest Login
      tags:
      - auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user using their username and password. Returns
        a JWT token and the user's data upon successful authentication.
      parameters:
      - description: Login Credentials. Both 'username' and 'password' are required.
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.loginRequest'
      produces:
      - application/json
      responses: {}
      summary: User Login
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      description: Invalidates the user session by blacklisting the current JWT token.
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: User Logout
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account with the provided details. Returns a
        JWT token and the created user's data upon successful registration.
      parameters:
      - description: Registration Details. 'fullname', 'username', 'password', 'college',
          'department', and 'academic_year' (1-5) are required. 'gdg_track' is optional.
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.registerRequest'
      produces:
      - application/json
      responses: {}
      summary: User Registration
      tags:
      - auth
  /api/v1/profile/:
    get:
      consumes:
      - application/json
      description: Retrieves the profile information of the currently authenticated
        user based on their JWT token.
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Get User Profile
      tags:
      - profile
    patch:
      consumes:
      - application/json
      description: Updates the profile details (Fullname and Academic Year) of the
        currently authenticated user. Guest users are not allowed to update their
        profile.
      parameters:
      - description: User Profile Update Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.UserProfileRequest'
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Update User Profile
      tags:
      - profile
  /api/v1/runs/:
    get:
      description: Retrieves all runs for the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: List of runs retrieved successfully.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/handlers.runResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
        "500":
          description: Internal Server Error.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
      security:
      - BearerAuth: []
      summary: Get User Runs
      tags:
      - runs
    post:
      consumes:
      - application/json
      description: Saves the stats of a completed game run for the authenticated user.
      parameters:
      - description: Run Statistics
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.runRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Run saved successfully.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.runResponse'
              type: object
        "400":
          description: Bad Request.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
        "401":
          description: Unauthorized.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
        "500":
          description: Internal Server Error.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
      security:
      - BearerAuth: []
      summary: Save Game Run
      tags:
      - runs
  /api/v1/spacecrafts/:
    get:
      description: Retrieves all spacecrafts owned by the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: List of spacecrafts retrieved successfully.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/handlers.spacecraftResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
        "500":
          description: Internal Server Error.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
      security:
      - BearerAuth: []
      summary: Get Spacecrafts
      tags:
      - spacecrafts
    post:
      consumes:
      - application/json
      description: Adds a new spacecraft to the user's garage.
      parameters:
      - description: Spacecraft Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.spacecraftRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Spacecraft added successfully.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.spacecraftResponse'
              type: object
        "400":
          description: Bad Request.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
        "401":
          description: Unauthorized.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
        "500":
          description: Internal Server Error.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
      security:
      - BearerAuth: []
      summary: Add Spacecraft
      tags:
      - spacecrafts
  /api/v1/spacecrafts/{id}/equip:
    patch:
      description: Equips a specific spacecraft for the authenticated user, unequipping
        all others.
      parameters:
      - description: Spacecraft ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Spacecraft equipped successfully.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.spacecraftResponse'
              type: object
        "400":
          description: Error equipping spacecraft.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
        "401":
          description: Error equipping spacecraft.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
        "403":
          description: Error equipping spacecraft.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
        "404":
          description: Error equipping spacecraft.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
        "500":
          description: Internal Server Error.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
      security:
      - BearerAuth: []
      summary: Equip Spacecraft
      tags:
      - spacecrafts
  /api/v1/spacecrafts/{id}/upgrade:
    patch:
      description: Upgrades a specific spacecraft's level for the authenticated user.
      parameters:
      - description: Spacecraft ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Spacecraft upgraded successfully.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.spacecraftResponse'
              type: object
        "400":
          description: Error upgrading spacecraft.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
        "401":
          description: Error upgrading spacecraft.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
        "403":
          description: Error upgrading spacecraft.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
        "404":
          description: Error upgrading spacecraft.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
        "500":
          description: Internal Server Error.
          schema:
            allOf:
            - $ref: '#/definitions/delivery.Response'
            - properties:
                errors:
                  $ref: '#/definitions/delivery.ErrorInfo'
              type: object
      security:
      - BearerAuth: []
      summary: Upgrade Spacecraft
      tags:
      - spacecrafts
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
